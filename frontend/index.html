    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')

            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
