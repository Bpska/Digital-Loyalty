server {
    listen 80;
    server_name _;

    # ── Static frontend assets ─────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy all /api/ calls to the backend container ─────────
    # This is the KEY fix: browser calls /api/v1/auth/login,
    # Nginx forwards it internally to the backend — no public IP needed.
    location /api/ {
        proxy_pass http://dlv_backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for httpOnly cookie (refresh token) to pass through correctly
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=Lax";
        proxy_read_timeout 60s;
    }

    # ── Uploaded files ──────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://dlv_backend:4000;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
